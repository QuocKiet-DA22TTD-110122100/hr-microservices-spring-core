spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_service}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer1:${EUREKA_PEER1_PORT}/eureka/,http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer2:${EUREKA_PEER2_PORT}/eureka/,http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer3:${EUREKA_PEER3_PORT}/eureka/}
  instance:
    prefer-ip-address: true

auth:
  login-attempt:
    max-failures: ${LOGIN_MAX_FAILURES}
    lock-minutes: ${LOGIN_LOCK_MINUTES}
  password-policy:
    expiry-days: ${PASSWORD_EXPIRY_DAYS}

sync:
  hr:
    enabled: ${HR_SYNC_ENABLED:true}
    base-url: ${HR_SYNC_BASE_URL:http://hr-service:8082}
    internal-secret: ${HR_SYNC_INTERNAL_SECRET:${INTERNAL_SECRET:change_me}}
    fixed-delay-ms: ${HR_SYNC_FIXED_DELAY_MS:5000}
    batch-size: ${HR_SYNC_BATCH_SIZE:20}
    max-retries: ${HR_SYNC_MAX_RETRIES:5}
    retry-base-delay-seconds: ${HR_SYNC_RETRY_BASE_DELAY_SECONDS:10}

server:
  port: ${SERVER_PORT:8086}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://zipkin:9411/api/v2/spans}
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
