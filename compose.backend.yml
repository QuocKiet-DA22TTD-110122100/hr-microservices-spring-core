x-eureka-default-zone: &eureka_default_zone http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer1:${EUREKA_PEER1_PORT}/eureka/
# Reduced heap for 8GB dev machines: 6 services × 256m = 1.5GB vs old 6 × 384m = 2.3GB
x-java-opts: &java_opts -Xmx256m -Xms128m -XX:TieredStopAtLevel=1
x-java-tool-options: &java_tool_options -Djava.security.egd=file:/dev/./urandom
x-logging-level: &logging_level WARN

services:

  # ── INFRASTRUCTURE ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 100m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  eureka-peer1:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-eureka-server:${IMAGE_TAG:-latest}
    build:
      context: ./eureka-server
      dockerfile: dockerfile
    container_name: eureka-peer1
    hostname: eureka-peer1
    ports:
      - "${EUREKA_PEER1_PORT}:${EUREKA_PEER1_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: peer1
      SERVER_PORT: ${EUREKA_PEER1_PORT}
      EUREKA_USERNAME: ${EUREKA_USERNAME}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_PEER1_PORT: ${EUREKA_PEER1_PORT}
      EUREKA_PEER2_PORT: ${EUREKA_PEER2_PORT}
      EUREKA_PEER3_PORT: ${EUREKA_PEER3_PORT}
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      SPRING_SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    volumes:
      - eureka1-data:/app/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u ${EUREKA_USERNAME}:${EUREKA_PASSWORD} http://localhost:${EUREKA_PEER1_PORT}/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 8
      start_period: 240s

  eureka-peer2:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-eureka-server:${IMAGE_TAG:-latest}
    build:
      context: ./eureka-server
      dockerfile: dockerfile
    container_name: eureka-peer2
    hostname: eureka-peer2
    ports:
      - "${EUREKA_PEER2_PORT}:${EUREKA_PEER2_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: peer2
      SERVER_PORT: ${EUREKA_PEER2_PORT}
      EUREKA_USERNAME: ${EUREKA_USERNAME}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_PEER1_PORT: ${EUREKA_PEER1_PORT}
      EUREKA_PEER2_PORT: ${EUREKA_PEER2_PORT}
      EUREKA_PEER3_PORT: ${EUREKA_PEER3_PORT}
      SPRING_SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    volumes:
      - eureka2-data:/app/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u ${EUREKA_USERNAME}:${EUREKA_PASSWORD} http://localhost:${EUREKA_PEER2_PORT}/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 8
      start_period: 240s

  eureka-peer3:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-eureka-server:${IMAGE_TAG:-latest}
    build:
      context: ./eureka-server
      dockerfile: dockerfile
    container_name: eureka-peer3
    hostname: eureka-peer3
    ports:
      - "${EUREKA_PEER3_PORT}:${EUREKA_PEER3_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: peer3
      SERVER_PORT: ${EUREKA_PEER3_PORT}
      EUREKA_USERNAME: ${EUREKA_USERNAME}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_PEER1_PORT: ${EUREKA_PEER1_PORT}
      EUREKA_PEER2_PORT: ${EUREKA_PEER2_PORT}
      EUREKA_PEER3_PORT: ${EUREKA_PEER3_PORT}
      SPRING_SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    volumes:
      - eureka3-data:/app/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u ${EUREKA_USERNAME}:${EUREKA_PASSWORD} http://localhost:${EUREKA_PEER3_PORT}/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 8
      start_period: 240s

  haproxy:
    image: haproxy:2.8-alpine
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "${HAPROXY_HTTP_PORT:-8088}:80"
      - "${HAPROXY_EUREKA_PORT:-18760}:8760"
      - "${HAPROXY_STATS_PORT:-18404}:8404"
    depends_on:
      eureka-peer1:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 100m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://admin:admin123@127.0.0.1:8404/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    profiles: ["observability"]
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "9411:9411"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── MESSAGING ───────────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    init: true
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq

  # ── IAM (KMS + Auth) ────────────────────────────────────────────────────────

  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kms-service:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-kms-service:${IMAGE_TAG:-latest}
    build:
      context: ./kms
      dockerfile: Dockerfile
    container_name: kms-service
    ports:
      - "8083:8083"
    environment:
      LOGGING_LEVEL_ROOT: *logging_level
      # KMS does RSA/AES crypto at startup — needs more heap than other services
      JAVA_OPTS: -Xmx384m -Xms192m -XX:TieredStopAtLevel=1
      JAVA_TOOL_OPTIONS: *java_tool_options
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"
    depends_on:
      eureka-peer1:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/actuator/health"]
      interval: 20s
      timeout: 30s
      retries: 10
      start_period: 360s

  auth-service:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-auth-service:${IMAGE_TAG:-latest}
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8086:8086"
    volumes:
      - ./auth-service/src/main/resources/data.sql:/data.sql:ro
    environment:
      SERVER_PORT: "8086"
      DB_URL: ${AUTH_DB_URL}
      DB_USERNAME: ${AUTH_DB_USERNAME}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      KMS_BASE_URL: http://kms-service:8083
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      LOGIN_MAX_FAILURES: ${LOGIN_MAX_FAILURES}
      LOGIN_LOCK_MINUTES: ${LOGIN_LOCK_MINUTES}
      PASSWORD_EXPIRY_DAYS: ${PASSWORD_EXPIRY_DAYS}
      HR_SYNC_ENABLED: "true"
      HR_SYNC_BASE_URL: http://hr-service:8082
      HR_SYNC_INTERNAL_SECRET: ${INTERNAL_SECRET}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
      SPRING_SQL_INIT_DATA_LOCATIONS: "file:/data.sql"
    depends_on:
      auth-postgres:
        condition: service_healthy
      kms-service:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/actuator/health"]
      interval: 20s
      timeout: 30s
      retries: 8
      start_period: 240s

  # ── HR ──────────────────────────────────────────────────────────────────────

  hr-mysql:
    image: mysql:8.0
    container_name: hr-mysql
    # Lean memory profile: disables performance_schema (~200MB saved) and shrinks InnoDB
    command: >
      --performance-schema=OFF
      --innodb-buffer-pool-size=64m
      --innodb-log-buffer-size=8m
      --max-connections=25
      --tmp-table-size=16m
      --max-heap-table-size=16m
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - hr-mysql-data:/var/lib/mysql
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  hr-service:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-hr-service:${IMAGE_TAG:-latest}
    build:
      context: ./hr-service
      dockerfile: Dockerfile
    container_name: hr-service
    ports:
      - "8085:8082"
    environment:
      SERVER_PORT: "8082"
      SPRING_APPLICATION_NAME: hr-service
      SPRING_DATASOURCE_URL: jdbc:mysql://hr-mysql:3306/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${HR_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${HR_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      SPRING_SQL_INIT_MODE: always
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    depends_on:
      hr-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 30s
      retries: 8
      start_period: 240s

  # ── BUSINESS (Project + Task) ────────────────────────────────────────────────

  business-mysql:
    image: mysql:8.0
    container_name: business-mysql
    # Lean memory profile: disables performance_schema (~200MB saved) and shrinks InnoDB
    command: >
      --performance-schema=OFF
      --innodb-buffer-pool-size=64m
      --innodb-log-buffer-size=8m
      --max-connections=25
      --tmp-table-size=16m
      --max-heap-table-size=16m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: project_db
      MYSQL_USER: ${BUSINESS_DB_USERNAME}
      MYSQL_PASSWORD: ${BUSINESS_DB_PASSWORD}
    volumes:
      - business-mysql-data:/var/lib/mysql
      - ./docker/init/business-mysql-init.sh:/docker-entrypoint-initdb.d/10-business-mysql-init.sh:ro
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  project-service:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-project-service:${IMAGE_TAG:-latest}
    build:
      context: ./project-service
      dockerfile: Dockerfile
    container_name: project-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: "8084"
      SPRING_DATASOURCE_URL: jdbc:mysql://business-mysql:3306/project_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${BUSINESS_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BUSINESS_DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      TASK_REASSIGN_DEFAULT_POOL_ASSIGNEE_ID: ${TASK_REASSIGN_DEFAULT_POOL_ASSIGNEE_ID:-1000}
      TASK_NOTIFICATION_PROVIDER: ${TASK_NOTIFICATION_PROVIDER:-log}
      TASK_NOTIFICATION_EMAIL_FROM: ${TASK_NOTIFICATION_EMAIL_FROM:-no-reply@hr.local}
      TASK_NOTIFICATION_EMAIL_ASSIGNEE_DOMAIN: ${TASK_NOTIFICATION_EMAIL_ASSIGNEE_DOMAIN:-hr.local}
      TASK_NOTIFICATION_SNS_REGION: ${TASK_NOTIFICATION_SNS_REGION:-ap-southeast-1}
      TASK_NOTIFICATION_SNS_TOPIC_ARN: ${TASK_NOTIFICATION_SNS_TOPIC_ARN:-}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      SPRING_SQL_INIT_MODE: always
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    depends_on:
      business-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/actuator/health"]
      interval: 20s
      timeout: 30s
      retries: 8
      start_period: 240s

  task-service:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-task-service:${IMAGE_TAG:-latest}
    build:
      context: ./task-service
      dockerfile: Dockerfile
    container_name: task-service
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: "8087"
      SPRING_DATASOURCE_URL: jdbc:mysql://business-mysql:3306/task_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${BUSINESS_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BUSINESS_DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      SPRING_SQL_INIT_MODE: always
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    depends_on:
      business-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/actuator/health"]
      interval: 20s
      timeout: 30s
      retries: 8
      start_period: 240s

  # ── API GATEWAY ──────────────────────────────────────────────────────────────

  api-gateway:
    image: ${API_GATEWAY_IMAGE:-ghcr.io/quockiet-da22ttd-110122100/hr-api-gateway:latest}
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_JWKS_URI: http://kms-service:8083/quan-ly-khoa/.well-known/jwks.json
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8086
      HR_SERVICE_URL: http://hr-service:8082
      PROJECT_SERVICE_URL: http://project-service:8084
      TASK_SERVICE_URL: http://task-service:8087
      # Relaxed rate limits for dev — production tightens these via env override
      APP_RATE_LIMIT_LOGIN_LIMIT: ${APP_RATE_LIMIT_LOGIN_LIMIT:-30}
      APP_RATE_LIMIT_LOGIN_WINDOW_SECONDS: ${APP_RATE_LIMIT_LOGIN_WINDOW_SECONDS:-60}
      SPRING_MAIN_BANNER_MODE: off
      JAVA_TOOL_OPTIONS: -Dspring.main.banner-mode=off -Dspring.backgroundpreinitializer.ignore=true -Djava.security.egd=file:/dev/./urandom
      SPRING_PROFILES_ACTIVE: docker
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      EUREKA_USERNAME: ${EUREKA_USERNAME}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"
    depends_on:
      eureka-peer1:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 30s
      retries: 8
      start_period: 240s

networks:
  microservices-network:
    name: microservices-network
    driver: bridge

volumes:
  redis-data: {}
  eureka1-data: {}
  eureka2-data: {}
  eureka3-data: {}
  prometheus-data: {}
  grafana-data: {}
  rabbitmq_data: {}
  rabbitmq_logs: {}
  auth-postgres-data:
    name: auth-postgres-data
  hr-mysql-data:
    name: hr-mysql-data
  business-mysql-data:
    name: business-mysql-data
