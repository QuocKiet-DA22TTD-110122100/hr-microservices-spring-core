x-eureka-default-zone: &eureka_default_zone http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer1:${EUREKA_PEER1_PORT}/eureka/
x-java-opts: &java_opts -Xmx256m -Xms128m
x-java-tool-options: &java_tool_options -Djava.security.egd=file:/dev/./urandom
x-logging-level: &logging_level WARN

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 100m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  eureka-peer1:
    build:
      context: ./eureka-server
      dockerfile: dockerfile
    container_name: eureka-peer1
    hostname: eureka-peer1
    ports:
      - "${EUREKA_PEER1_PORT}:${EUREKA_PEER1_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: peer1
      SERVER_PORT: ${EUREKA_PEER1_PORT}
      EUREKA_USERNAME: ${EUREKA_USERNAME}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_PEER1_PORT: ${EUREKA_PEER1_PORT}
      EUREKA_PEER2_PORT: ${EUREKA_PEER2_PORT}
      EUREKA_PEER3_PORT: ${EUREKA_PEER3_PORT}
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      SPRING_SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    volumes:
      - eureka1-data:/app/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u ${EUREKA_USERNAME}:${EUREKA_PASSWORD} http://localhost:${EUREKA_PEER1_PORT}/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 8
      start_period: 240s

  eureka-peer2:
    build:
      context: ./eureka-server
      dockerfile: dockerfile
    container_name: eureka-peer2
    hostname: eureka-peer2
    ports:
      - "${EUREKA_PEER2_PORT}:${EUREKA_PEER2_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: peer2
      SERVER_PORT: ${EUREKA_PEER2_PORT}
      EUREKA_USERNAME: ${EUREKA_USERNAME}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_PEER1_PORT: ${EUREKA_PEER1_PORT}
      EUREKA_PEER2_PORT: ${EUREKA_PEER2_PORT}
      EUREKA_PEER3_PORT: ${EUREKA_PEER3_PORT}
      SPRING_SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    volumes:
      - eureka2-data:/app/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u ${EUREKA_USERNAME}:${EUREKA_PASSWORD} http://localhost:${EUREKA_PEER2_PORT}/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 8
      start_period: 240s

  eureka-peer3:
    build:
      context: ./eureka-server
      dockerfile: dockerfile
    container_name: eureka-peer3
    hostname: eureka-peer3
    ports:
      - "${EUREKA_PEER3_PORT}:${EUREKA_PEER3_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: peer3
      SERVER_PORT: ${EUREKA_PEER3_PORT}
      EUREKA_USERNAME: ${EUREKA_USERNAME}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_PEER1_PORT: ${EUREKA_PEER1_PORT}
      EUREKA_PEER2_PORT: ${EUREKA_PEER2_PORT}
      EUREKA_PEER3_PORT: ${EUREKA_PEER3_PORT}
      SPRING_SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    volumes:
      - eureka3-data:/app/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u ${EUREKA_USERNAME}:${EUREKA_PASSWORD} http://localhost:${EUREKA_PEER3_PORT}/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 8
      start_period: 240s

  haproxy:
    image: haproxy:2.8-alpine
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "${HAPROXY_HTTP_PORT:-8088}:80"
      - "${HAPROXY_EUREKA_PORT:-18760}:8760"
      - "${HAPROXY_STATS_PORT:-18404}:8404"
    depends_on:
      eureka-peer1:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 100m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://admin:admin123@127.0.0.1:8404/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "9411:9411"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  microservices-network:
    name: microservices-network
    driver: bridge

volumes:
  redis-data: {}
  eureka1-data: {}
  eureka2-data: {}
  eureka3-data: {}
  prometheus-data: {}
  grafana-data: {}
