server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    whitelabel:
      enabled: false

# JWT Configuration - must be at root level
app:
  jwt:
    jwks-uri: ${JWT_JWKS_URI:http://kms/kms/internal/.well-known/jwks.json}
    jwks-cache-seconds: ${JWT_JWKS_CACHE_SECONDS:300}
  security:
    token-blacklist:
      l1:
        max-size: ${TOKEN_BLACKLIST_L1_MAX_SIZE:10000}
        ttl-seconds: ${TOKEN_BLACKLIST_L1_TTL_SECONDS:30}
management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://zipkin:9411/api/v2/spans}
  endpoint:
    prometheus:
      enabled: true
    gateway:
      enabled: true
spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      # Eureka Discovery Routes
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      # Default filters
      default-filters:
        - name: AddRequestHeader
          args:
            name: X-Internal-Secret
            value: "${INTERNAL_SECRET}"
        - name: DedupeResponseHeader
          args:
            strategy: RETAIN_FIRST
            headers:
              - Access-Control-Allow-Origin
              - Access-Control-Allow-Credentials

      # Routes configuration
      routes:
        # Eureka Dashboard Route - Forward to HAProxy load balancer
        - id: eureka-dashboard-route
          uri: http://localhost:8760
          predicates:
            - Path=/eureka/**
          metadata:
            requires-hmac: false

        # Demo Service Route
        - id: demo-service-route
          uri: lb://demo-service
          predicates:
            - Path=/demo/**
          filters:
            - StripPrefix=1
          metadata:
            requires-hmac: false

        # KMS Service Route
        - id: kms-service-route
          uri: lb://kms
          predicates:
            - Path=/kms/**
          filters:
            - StripPrefix=1
          metadata:
            requires-hmac: false

        # Public IAM endpoints for browser clients via /api/iam/*
        - id: auth-public-route
          uri: lb://auth-service
          predicates:
            - Path=/api/iam/login,/api/iam/register,/api/iam/logout
          filters:
            - StripPrefix=1
          metadata:
            requires-hmac: false
            requires-jwt: false

        # Protected IAM endpoints via /api/iam/*
        - id: auth-protected-route
          uri: lb://auth-service
          predicates:
            - Path=/api/iam/verify,/api/iam/change-password,/api/iam/admin/**,/api/iam/sync-status/**,/api/iam/sync-retry/**
          filters:
            - StripPrefix=1
          metadata:
            requires-hmac: false
            requires-jwt: true

        - id: hr-service-route
          uri: lb://hr-service
          predicates:
            - Path=/api/hr/**
          filters:
            - StripPrefix=2
          metadata:
            requires-hmac: true
            requires-jwt: true

        # NEW: Mock IAM User routes for /iam/user/* (Postman tests)
        - id: mock-iam-user-route
          uri: lb://mock-service
          predicates:
            - Path=/iam/user/**
          metadata:
            requires-hmac: false
            requires-jwt: false

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

---
# Docker Profile Configuration
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: ${REDIS_HOST:redis-server}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

# Eureka Client Configuration
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer1:${EUREKA_PEER1_PORT}/eureka/,http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer2:${EUREKA_PEER2_PORT}/eureka/,http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer3:${EUREKA_PEER3_PORT}/eureka/}
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      zone: us-east-1a
      version: 1.0.0
      description: API Gateway for microservices

app:
  jwt:
    jwks-uri: ${JWT_JWKS_URI:http://kms/kms/internal/.well-known/jwks.json}
    jwks-cache-seconds: ${JWT_JWKS_CACHE_SECONDS:300}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.server: DEBUG
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html