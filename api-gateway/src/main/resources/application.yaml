server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    whitelabel:
      enabled: false

# JWT Configuration - must be at root level
app:
  jwt:
    secret: ${JWT_SECRET}
management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    gateway:
      enabled: true
spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      # Eureka Discovery Routes
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      # Default filters
      default-filters:
        - name: AddRequestHeader
          args:
            name: X-Internal-Secret
            value: "${INTERNAL_SECRET}"
        - name: DedupeResponseHeader
          args:
            strategy: RETAIN_FIRST
            headers:
              - Access-Control-Allow-Origin
              - Access-Control-Allow-Credentials

      # Routes configuration
      routes:
        # Eureka Dashboard Route - Forward to HAProxy load balancer
        - id: eureka-dashboard-route
          uri: http://localhost:8761
          predicates:
            - Path=/eureka/**
          metadata:
            requires-hmac: false

        # KMS Service Route
        - id: kms-service-route
          uri: lb://kms
          predicates:
            - Path=/kms/**
          filters:
            - StripPrefix=1
          metadata:
            requires-hmac: false

        # IAM auth legacy path -> auth-service via Eureka
        - id: iam-auth-route
          uri: lb://auth-service
          predicates:
            - Path=/iam/auth/**
          filters:
            - RewritePath=/iam/auth/(?<segment>.*), /iam/${segment}
          metadata:
            requires-hmac: false

        # Login legacy path -> auth-service (/iam/login)
        - id: iam-user-login-route
          uri: lb://auth-service
          predicates:
            - Path=/iam/user/login
          filters:
            - SetPath=/iam/login
          metadata:
            requires-hmac: true
            requires-jwt: false

        # API v1 legacy auth path -> auth-service via Eureka
        - id: api-v1-auth-route
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /iam/${segment}
          metadata:
            requires-hmac: false
            requires-jwt: false

        # Register legacy path -> auth-service (/iam/register)
        - id: iam-user-register-route
          uri: lb://auth-service
          predicates:
            - Path=/iam/user/register
          filters:
            - SetPath=/iam/register
          metadata:
            requires-hmac: true
            requires-jwt: false

        # Legacy /iam/user/* path -> auth-service (/iam/*)
        - id: iam-user-route
          uri: lb://auth-service
          predicates:
            - Path=/iam/user/**
          filters:
            - RewritePath=/iam/user/(?<segment>.*), /iam/${segment}
          metadata:
            requires-hmac: true
            requires-jwt: true

        # Auth service route via Eureka discovery
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            - Path=/iam/**
          metadata:
            requires-hmac: false
            requires-jwt: false

        - id: hr-service-route
          uri: lb://hr-service
          predicates:
            - Path=/api/hr/**
          filters:
            - StripPrefix=2
          metadata:
            requires-hmac: true
            requires-jwt: true

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

---
# Docker Profile Configuration
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: ${REDIS_HOST:redis-server}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

# Eureka Client Configuration
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer1:${EUREKA_PEER1_PORT}/eureka/,http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer2:${EUREKA_PEER2_PORT}/eureka/,http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer3:${EUREKA_PEER3_PORT}/eureka/}
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      zone: us-east-1a
      version: 1.0.0
      description: API Gateway for microservices

app:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.server: DEBUG
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO