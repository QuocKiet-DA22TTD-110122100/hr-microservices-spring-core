server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    whitelabel:
      enabled: false

# JWT Configuration - must be at root level
app:
  jwt:
    secret: ${JWT_SECRET:microservices-jwt-secret-key-2026-minimum-32chars}
management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    gateway:
      enabled: true
spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      # Eureka Discovery Routes
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      # Default filters
      default-filters:
        - name: AddRequestHeader
          args:
            name: X-Internal-Secret
            value: "your-very-secure-secret-key-2026"
        - name: DedupeResponseHeader
          args:
            strategy: RETAIN_FIRST
            headers:
              - Access-Control-Allow-Origin
              - Access-Control-Allow-Credentials

      # Routes configuration
      routes:
        # Eureka Dashboard Route - Forward to HAProxy load balancer
        - id: eureka-dashboard-route
          uri: http://localhost:8760
          predicates:
            - Path=/eureka/**
          metadata:
            requires-hmac: false

        # Demo Service Route
        - id: demo-service-route
          uri: lb://demo-service
          predicates:
            - Path=/demo/**
          filters:
            - StripPrefix=1
          metadata:
            requires-hmac: false

        # KMS Service Route
        - id: kms-service-route
          uri: lb://kms
          predicates:
            - Path=/kms/**
          filters:
            - StripPrefix=1
          metadata:
            requires-hmac: false

        # IAM Auth Route (existing) - Enhanced với container networking
        - id: iam-auth-route
          uri: ${MOCK_IAM_SERVICE_URL:http://mock-iam-service:8081}
          predicates:
            - Path=/iam/auth/**
          metadata:
            requires-hmac: false

        # Login: cần HMAC, KHÔNG cần JWT (đang xin token)
        - id: iam-user-login-route
          uri: ${MOCK_IAM_SERVICE_URL:http://mock-iam-service:8081}
          predicates:
            - Path=/iam/user/login
          metadata:
            requires-hmac: true
            requires-jwt: false

        # API V1 Auth Routes - Direct to mock-service với container networking
        - id: api-v1-auth-route
          uri: ${MOCK_IAM_SERVICE_URL:http://mock-iam-service:8081}
          predicates:
            - Path=/api/v1/auth/**
          metadata:
            requires-hmac: false
            requires-jwt: false

        # Register: cần HMAC, KHÔNG cần JWT
        - id: iam-user-register-route
          uri: ${MOCK_IAM_SERVICE_URL:http://mock-iam-service:8081}
          predicates:
            - Path=/iam/user/register
          metadata:
            requires-hmac: true
            requires-jwt: false

        # Các endpoint user khác: cần cả HMAC lẫn JWT
        - id: iam-user-route
          uri: ${MOCK_IAM_SERVICE_URL:http://mock-iam-service:8081}
          predicates:
            - Path=/iam/user/**
          metadata:
            requires-hmac: true
            requires-jwt: true

        - id: hr-service-route
          uri: lb://hr-service
          predicates:
            - Path=/api/hr/**
          filters:
            - StripPrefix=2
          metadata:
            requires-hmac: true
            requires-jwt: true

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

---
# Docker Profile Configuration
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: ${REDIS_HOST:redis-server}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}

# Eureka Client Configuration
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka:123456@eureka-peer1:8761/eureka/,http://eureka:123456@eureka-peer2:8762/eureka/,http://eureka:123456@eureka-peer3:8763/eureka/}
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      zone: us-east-1a
      version: 1.0.0
      description: API Gateway for microservices

app:
  jwt:
    secret: ${JWT_SECRET:microservices-jwt-secret-key-2026-minimum-32chars}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.server: DEBUG
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO