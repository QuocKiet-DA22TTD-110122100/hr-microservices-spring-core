spring:
  application:
    name: task-service
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:never}
      data-locations: classpath:data.sql
  datasource:
    url: jdbc:mysql://localhost:3306/task_db?useSSL=false&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        '[format_sql]': true
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:60s}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          max-wait: ${REDIS_POOL_MAX_WAIT:-1ms}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: ${RABBITMQ_CONNECTION_TIMEOUT:10000}

server:
  port: 8083
  servlet:
    context-path: /

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://jaeger:9411/api/v2/spans}
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: WARN
    '[com.hrservice.task]': INFO

task:
  reassign:
    defaultPoolAssigneeId: ${TASK_REASSIGN_DEFAULT_POOL_ASSIGNEE_ID:0}
  notification:
    provider: ${TASK_NOTIFICATION_PROVIDER:log}
    snsRegion: ${TASK_NOTIFICATION_SNS_REGION:ap-southeast-1}
    emailFrom: ${TASK_NOTIFICATION_EMAIL_FROM:no-reply@hr.local}
    assigneeDomain: ${TASK_NOTIFICATION_EMAIL_ASSIGNEE_DOMAIN:hr.local}
    snsTopicArn: ${TASK_NOTIFICATION_SNS_TOPIC_ARN:}
    assigneeEmailMap:
      "1001": manager.one@hr.local
      "1002": manager.two@hr.local
