x-eureka-default-zone: &eureka_default_zone http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer1:${EUREKA_PEER1_PORT}/eureka/
x-java-opts: &java_opts -Xmx384m -Xms128m
x-java-tool-options: &java_tool_options -Djava.security.egd=file:/dev/./urandom
x-logging-level: &logging_level WARN

services:
  business-mysql:
    image: mysql:8.0
    container_name: business-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: project_db
      MYSQL_USER: ${BUSINESS_DB_USERNAME}
      MYSQL_PASSWORD: ${BUSINESS_DB_PASSWORD}
    volumes:
      - business-mysql-data:/var/lib/mysql
      - ./docker/init/business-mysql-init.sh:/docker-entrypoint-initdb.d/10-business-mysql-init.sh:ro
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  project-service:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-project-service:${IMAGE_TAG:-latest}
    build:
      context: ./project-service
      dockerfile: Dockerfile
    container_name: project-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: "8084"
      SPRING_DATASOURCE_URL: jdbc:mysql://business-mysql:3306/project_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${BUSINESS_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BUSINESS_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      TASK_REASSIGN_DEFAULT_POOL_ASSIGNEE_ID: ${TASK_REASSIGN_DEFAULT_POOL_ASSIGNEE_ID:-1000}
      TASK_NOTIFICATION_PROVIDER: ${TASK_NOTIFICATION_PROVIDER:-log}
      TASK_NOTIFICATION_EMAIL_FROM: ${TASK_NOTIFICATION_EMAIL_FROM:-no-reply@hr.local}
      TASK_NOTIFICATION_EMAIL_ASSIGNEE_DOMAIN: ${TASK_NOTIFICATION_EMAIL_ASSIGNEE_DOMAIN:-hr.local}
      TASK_NOTIFICATION_SNS_REGION: ${TASK_NOTIFICATION_SNS_REGION:-ap-southeast-1}
      TASK_NOTIFICATION_SNS_TOPIC_ARN: ${TASK_NOTIFICATION_SNS_TOPIC_ARN:-}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    depends_on:
      business-mysql:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/actuator/health"]
      interval: 20s
      timeout: 30s
      retries: 8
      start_period: 240s

  task-service:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-task-service:${IMAGE_TAG:-latest}
    build:
      context: ./task-service
      dockerfile: Dockerfile
    container_name: task-service
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: "8087"
      SPRING_DATASOURCE_URL: jdbc:mysql://business-mysql:3306/task_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${BUSINESS_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BUSINESS_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
    depends_on:
      business-mysql:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/actuator/health"]
      interval: 20s
      timeout: 30s
      retries: 8
      start_period: 240s

networks:
  microservices-network:
    name: microservices-network
    external: true

volumes:
  business-mysql-data:
    name: business-mysql-data
