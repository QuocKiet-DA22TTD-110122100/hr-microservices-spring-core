name: Docker Build & Publish

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'src/api-gateway/**'
      - 'src/auth-service/**'
      - 'src/eureka-server/**'
      - 'src/frontend/**'
      - 'src/hr-service/**'
      - 'src/kms/**'
      - 'src/project-service/**'
      - 'src/task-service/**'
      - 'src/compose*.yml'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/api-gateway/**'
      - 'src/auth-service/**'
      - 'src/eureka-server/**'
      - 'src/frontend/**'
      - 'src/hr-service/**'
      - 'src/kms/**'
      - 'src/project-service/**'
      - 'src/task-service/**'
      - 'src/compose*.yml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository = "QuocKiet-DA22TTD-110122100/hr-microservices-spring-core" (ví dụ)
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    # Cấp quyền ghi packages để push lên GHCR
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - image: api-gateway
            context: ./src/api-gateway
            dockerfile: ./src/api-gateway/Dockerfile
          - image: auth-service
            context: ./src/auth-service
            dockerfile: ./src/auth-service/Dockerfile
          - image: eureka-server
            context: ./src/eureka-server
            dockerfile: ./src/eureka-server/dockerfile
          - image: frontend
            context: ./src/frontend
            dockerfile: ./src/frontend/Dockerfile
          - image: hr-service
            context: ./src/hr-service
            dockerfile: ./src/hr-service/Dockerfile
          - image: kms-service
            context: ./src/kms
            dockerfile: ./src/kms/Dockerfile
          - image: project-service
            context: ./src/project-service
            dockerfile: ./src/project-service/Dockerfile
          - image: task-service
            context: ./src/task-service
            dockerfile: ./src/task-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        # Chỉ login khi push lên main (không login khi PR để tránh lỗi permission)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN có sẵn, không cần tạo secret thủ công
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/hr-${{ matrix.image }}
          tags: |
            # Tag :latest khi push lên main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag theo SHA commit (7 ký tự đầu)
            type=sha,prefix=sha-,format=short
            # Tag theo branch name (cho nhánh khác main)
            type=ref,event=branch
            # Tag theo PR number
            type=ref,event=pr

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # Push lên GHCR khi merge vào main; chỉ build (không push) khi PR
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  validate-compose:
    name: Validate compose files
    runs-on: ubuntu-latest

    env:
      API_GATEWAY_IMAGE: hr-api-gateway:ci
      AUTH_DB_PASSWORD: auth_ci_password
      AUTH_DB_URL: jdbc:postgresql://auth-postgres:5432/auth_db
      AUTH_DB_USERNAME: auth_ci
      BUSINESS_DB_PASSWORD: business_ci_password
      BUSINESS_DB_USERNAME: business_ci
      EUREKA_PASSWORD: eureka_ci_password
      EUREKA_PEER1_PORT: '8761'
      EUREKA_PEER2_PORT: '8762'
      EUREKA_PEER3_PORT: '8763'
      EUREKA_USERNAME: eureka
      FRONTEND_IMAGE: hr-frontend:ci
      HR_DB_PASSWORD: hr_ci_password
      HR_DB_USERNAME: hr_ci
      IMAGE_TAG: ci
      INTERNAL_SECRET: ci-internal-secret
      JWT_SECRET: ci-jwt-secret
      LOGIN_LOCK_MINUTES: '15'
      LOGIN_MAX_FAILURES: '5'
      MYSQL_DATABASE: hr_db
      MYSQL_ROOT_PASSWORD: root_ci_password
      PASSWORD_EXPIRY_DAYS: '90'
      POSTGRES_DB: auth_db
      POSTGRES_PASSWORD: postgres_ci_password
      POSTGRES_USER: auth_ci
      REDIS_PASSWORD: redis_ci_password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate backend compose
        working-directory: src
        run: docker compose -f compose.backend.yml config

      - name: Validate frontend compose
        working-directory: src
        run: docker compose -f compose.frontend.yml config
