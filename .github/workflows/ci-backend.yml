name: "CI — Backend"

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - '*/src/**'
      - '*/pom.xml'
      - 'pom.xml'
      - 'mvnw'
      - '.mvn/**'
      - '*/Dockerfile'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - '*/src/**'
      - '*/pom.xml'
      - 'pom.xml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated, empty = all)'
        required: false
        default: ''

jobs:
  # ─── 1. Detect which services changed ─────────────────────────────────────
  changes:
    name: "① Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      api-gateway:    ${{ steps.filter.outputs.api-gateway }}
      auth-service:   ${{ steps.filter.outputs.auth-service }}
      hr-service:     ${{ steps.filter.outputs.hr-service }}
      kms:            ${{ steps.filter.outputs.kms }}
      project-service: ${{ steps.filter.outputs.project-service }}
      task-service:   ${{ steps.filter.outputs.task-service }}
      eureka-server:  ${{ steps.filter.outputs.eureka-server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'api-gateway/**'
              - 'pom.xml'
              - 'mvnw'
            auth-service:
              - 'auth-service/**'
              - 'pom.xml'
            hr-service:
              - 'hr-service/**'
              - 'pom.xml'
            kms:
              - 'kms/**'
              - 'pom.xml'
            project-service:
              - 'project-service/**'
              - 'pom.xml'
            task-service:
              - 'task-service/**'
              - 'pom.xml'
            eureka-server:
              - 'eureka-server/**'
              - 'pom.xml'

  # ─── 2. Build & test each service ─────────────────────────────────────────
  api-gateway:
    name: "② api-gateway"
    needs: changes
    if: needs.changes.outputs.api-gateway == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw -B -ntp -pl api-gateway -am clean verify

  auth-service:
    name: "② auth-service"
    needs: changes
    if: needs.changes.outputs.auth-service == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw -B -ntp -pl auth-service -am clean verify

  hr-service:
    name: "② hr-service"
    needs: changes
    if: needs.changes.outputs.hr-service == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw -B -ntp -pl hr-service -am clean verify

  kms:
    name: "② kms-service"
    needs: changes
    if: needs.changes.outputs.kms == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw -B -ntp -pl kms -am clean verify

  project-service:
    name: "② project-service"
    needs: changes
    if: needs.changes.outputs.project-service == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw -B -ntp -pl project-service -am clean verify

  task-service:
    name: "② task-service"
    needs: changes
    if: needs.changes.outputs.task-service == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw -B -ntp -pl task-service -am clean verify

  # ─── 3. Docker build all services ─────────────────────────────────────────
  docker-backend:
    name: "③ Docker — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [api-gateway, auth-service, hr-service, kms, project-service, task-service]
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - service: api-gateway
            context: ./api-gateway
            image: hr-api-gateway
          - service: auth-service
            context: ./auth-service
            image: hr-auth-service
          - service: hr-service
            context: ./hr-service
            image: hr-hr-service
          - service: kms
            context: ./kms
            image: hr-kms-service
          - service: project-service
            context: ./project-service
            image: hr-project-service
          - service: task-service
            context: ./task-service
            image: hr-task-service
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ─── 4. Summary ───────────────────────────────────────────────────────────
  summary:
    name: "④ CI Summary"
    runs-on: ubuntu-latest
    needs: [api-gateway, auth-service, hr-service, kms, project-service, task-service]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## Backend CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| api-gateway | ${{ needs.api-gateway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| auth-service | ${{ needs.auth-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| hr-service | ${{ needs.hr-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| kms | ${{ needs.kms.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| project-service | ${{ needs.project-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| task-service | ${{ needs.task-service.result }} |" >> $GITHUB_STEP_SUMMARY
