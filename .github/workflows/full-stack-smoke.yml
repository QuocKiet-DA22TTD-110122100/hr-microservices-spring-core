name: Full Stack Smoke

concurrency:
  group: full-stack-smoke-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  run-full-stack:
    name: Run full stack on GitHub runner
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read

    env:
      API_GATEWAY_IMAGE: hr-api-gateway:ci
      AUTH_DB_PASSWORD: auth_password
      AUTH_DB_URL: jdbc:postgresql://auth-postgres:5432/auth_service
      AUTH_DB_USERNAME: auth_user
      BUSINESS_DB_PASSWORD: business_password
      BUSINESS_DB_USERNAME: business_user
      COMPOSE_PROJECT_NAME: hr-full-stack-ci
      EUREKA_PASSWORD: change_me
      EUREKA_PEER1_PORT: '8761'
      EUREKA_PEER2_PORT: '8762'
      EUREKA_PEER3_PORT: '8763'
      EUREKA_USERNAME: admin
      FRONTEND_IMAGE: hr-frontend:ci
      HAPROXY_EUREKA_PORT: '18760'
      HAPROXY_HTTP_PORT: '8088'
      HAPROXY_STATS_PORT: '18404'
      HR_DB_PASSWORD: change_me
      HR_DB_USERNAME: root
      INTERNAL_SECRET: change_me
      JWT_SECRET: your-super-secret-jwt-key-min-32-chars-please-change-in-production
      LOGIN_LOCK_MINUTES: '15'
      LOGIN_MAX_FAILURES: '5'
      MYSQL_DATABASE: hr_service
      MYSQL_ROOT_PASSWORD: change_me
      PASSWORD_EXPIRY_DAYS: '90'
      POSTGRES_DB: auth_service
      POSTGRES_PASSWORD: auth_password
      POSTGRES_USER: auth_user
      REDIS_HOST: redis
      REDIS_PASSWORD: change_me
      REDIS_PORT: '6379'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Pull pre-built images from GHCR
        run: |
          docker compose -f compose.backend.yml pull --ignore-pull-failures
          docker compose -f compose.frontend.yml pull --ignore-pull-failures

      - name: Start backend
        run: docker compose -f compose.backend.yml up -d --wait --wait-timeout 900

      - name: Start frontend
        run: docker compose -f compose.frontend.yml up -d --wait --wait-timeout 900

      - name: Show running containers
        run: docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}'

      - name: Smoke health endpoints
        shell: bash
        run: |
          set -euo pipefail

          check_url() {
            local name="$1"
            local url="$2"
            for attempt in {1..30}; do
              if curl -fsS --max-time 20 "$url" >/tmp/health-response.txt; then
                echo "OK: $name"
                cat /tmp/health-response.txt
                echo
                return 0
              fi
              echo "Waiting for $name ($attempt/30)"
              sleep 10
            done
            echo "FAILED: $name at $url"
            return 1
          }

          check_url "Eureka" "http://admin:change_me@localhost:8761/actuator/health"
          check_url "KMS" "http://localhost:8083/actuator/health"
          check_url "Auth" "http://localhost:8086/actuator/health"
          check_url "HR" "http://localhost:8085/actuator/health"
          check_url "Project" "http://localhost:8084/actuator/health"
          check_url "Task" "http://localhost:8087/actuator/health"
          check_url "Gateway" "http://localhost:8080/actuator/health"
          check_url "Frontend" "http://localhost:3000/"

      - name: Smoke login through gateway
        shell: bash
        run: |
          set -euo pipefail

          login_response="$(curl -fsS --max-time 60 \
            -H 'Content-Type: application/json' \
            -X POST \
            -d '{"username":"admin","password":"Admin@123"}' \
            http://localhost:8080/api/xac-thuc/dang-nhap)"

          echo "$login_response"
          token="$(LOGIN_RESPONSE="$login_response" python3 - <<'PY'
          import json
          import os

          data = json.loads(os.environ["LOGIN_RESPONSE"])
          token = data.get("token") or data.get("access_token")
          if not token:
              raise SystemExit("No token found in login response")
          print(token)
          PY
          )"

          verify_response="$(curl -fsS --max-time 60 \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${token}" \
            -X POST \
            -d "{\"token\":\"${token}\"}" \
            http://localhost:8080/api/xac-thuc/kiem-tra)"

          echo "$verify_response"
          VERIFY_RESPONSE="$verify_response" python3 - <<'PY'
          import json
          import os

          data = json.loads(os.environ["VERIFY_RESPONSE"])
          if data.get("valid") is not True:
              raise SystemExit("Token verification failed")
          print("Gateway login and token verification passed")
          PY

      - name: Dump logs on failure
        if: failure()
        run: |
          docker ps -a
          docker compose -f compose.backend.yml -f compose.frontend.yml logs --tail=250

      - name: Stop stack
        if: always()
        run: |
          docker compose -f compose.backend.yml -f compose.frontend.yml down --remove-orphans --volumes
