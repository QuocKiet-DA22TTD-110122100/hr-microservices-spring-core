name: UI Quality Check

concurrency:
  group: ui-quality-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/index.html'
      - 'frontend/tailwind.config.*'
      - 'frontend/tsconfig*.json'
      - 'frontend/package*.json'
      - '.github/workflows/ui-quality.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/index.html'
      - 'frontend/tailwind.config.*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual UI quality check'

jobs:
  type-check:
    name: TypeScript — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  lint:
    name: ESLint — Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

  test:
    name: Vitest — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run tests with coverage
        run: npm run test -- --run --reporter=verbose

  build:
    name: Vite — Production Build
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build production bundle
        run: npm run build

      - name: Check bundle size
        run: |
          echo "=== Bundle size report ==="
          du -sh dist/assets/*.js 2>/dev/null | sort -h || echo "No JS assets found"
          du -sh dist/assets/*.css 2>/dev/null | sort -h || echo "No CSS assets found"
          echo "=== Total dist size ==="
          du -sh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          retention-days: 3

  docker-build:
    name: Docker — Frontend Image
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag hr-frontend:${{ github.sha }} \
            --tag hr-frontend:latest \
            ./frontend

      - name: Smoke test — container starts
        run: |
          docker run -d --name test-frontend -p 3000:80 hr-frontend:${{ github.sha }}
          sleep 3
          curl -sf http://localhost:3000/ | head -5
          docker stop test-frontend && docker rm test-frontend
