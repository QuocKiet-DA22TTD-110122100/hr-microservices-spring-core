name: "CI — Frontend"

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/frontend/**'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip unit tests'
        type: boolean
        default: false

jobs:
  # ─── 1. Type check ────────────────────────────────────────────────────────
  typecheck:
    name: "① TypeScript"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npx tsc --noEmit

  # ─── 2. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: "② ESLint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run lint

  # ─── 3. Unit tests ────────────────────────────────────────────────────────
  test:
    name: "③ Vitest"
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit --no-fund
      - name: Run tests
        run: npm run test -- --run --reporter=verbose
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: src/frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

  # ─── 4. Build ─────────────────────────────────────────────────────────────
  build:
    name: "④ Vite Build"
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit --no-fund
      - name: Build production bundle
        run: npm run build
      - name: Bundle size report
        run: |
          echo "=== JS chunks ==="
          find dist/assets -name "*.js" -exec du -sh {} \; | sort -h
          echo "=== CSS ==="
          find dist/assets -name "*.css" -exec du -sh {} \; | sort -h
          echo "=== Total dist ==="
          du -sh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: src/frontend/dist
          retention-days: 3

  # ─── 5. Docker image ──────────────────────────────────────────────────────
  docker:
    name: "⑤ Docker Image"
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/hr-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Smoke test — container starts
        if: github.event_name != 'pull_request'
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "Testing image: $IMAGE"
          docker run -d --name smoke-frontend -p 3001:80 "$IMAGE"
          sleep 5
          curl -sf http://localhost:3001/ | grep -q "DOCTYPE" && echo "✅ Frontend serving HTML" || (docker logs smoke-frontend && exit 1)
          docker stop smoke-frontend && docker rm smoke-frontend
