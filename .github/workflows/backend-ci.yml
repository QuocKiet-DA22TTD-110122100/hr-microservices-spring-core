name: Backend CI

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'src/pom.xml'
      - 'src/mvnw'
      - 'src/mvnw.cmd'
      - 'src/.mvn/**'
      - 'src/api-gateway/**'
      - 'src/auth-service/**'
      - 'src/eureka-server/**'
      - 'src/hr-service/**'
      - 'src/kms/**'
      - 'src/project-service/**'
      - 'src/task-service/**'
      - 'src/compose*.yml'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/pom.xml'
      - 'src/mvnw'
      - 'src/mvnw.cmd'
      - 'src/.mvn/**'
      - 'src/api-gateway/**'
      - 'src/auth-service/**'
      - 'src/eureka-server/**'
      - 'src/hr-service/**'
      - 'src/kms/**'
      - 'src/project-service/**'
      - 'src/task-service/**'
      - 'src/compose*.yml'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      service-matrix: ${{ steps.changes.outputs.service-matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect affected backend services
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import fnmatch
          import json
          import os
          import subprocess

          services = [
              'api-gateway',
              'auth-service',
              'eureka-server',
              'hr-service',
              'kms',
              'project-service',
              'task-service',
          ]
          shared_patterns = [
              'src/pom.xml',
              'src/mvnw',
              'src/mvnw.cmd',
              'src/.mvn/**',
              'src/compose*.yml',
              '.github/workflows/backend-ci.yml',
          ]

          event_name = os.environ['EVENT_NAME']
          head_sha = os.environ['HEAD_SHA']

          if event_name == 'workflow_dispatch':
              selected = services
          else:
              base_sha = os.environ['PR_BASE_SHA'] if event_name == 'pull_request' else os.environ['BASE_SHA']
              if not base_sha or set(base_sha) == {'0'}:
                  base_sha = subprocess.check_output(
                      ['git', 'rev-list', '--max-parents=0', 'HEAD'],
                      text=True,
                  ).splitlines()[0]

              changed_files = subprocess.check_output(
                  ['git', 'diff', '--name-only', base_sha, head_sha],
                  text=True,
              ).splitlines()

              if any(
                  any(fnmatch.fnmatch(changed, pattern) for pattern in shared_patterns)
                  for changed in changed_files
              ):
                  selected = services
              else:
                  selected = [
                      service
                      for service in services
                      if any(changed.startswith(f'src/{service}/') for changed in changed_files)
                  ]

          print(f"service-matrix={json.dumps({'service': selected})}")
          PY

  build-backend:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJSON(needs.detect-changes.outputs.service-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: src
        run: chmod +x mvnw

      - name: Build service
        working-directory: src
        run: ./mvnw -B -ntp -T 1 -pl ${{ matrix.service }} -am clean install -DskipTests
