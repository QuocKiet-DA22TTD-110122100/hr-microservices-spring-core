name: Warm Maven Cache

# Pre-downloads all Maven dependencies so backend-ci.yml hits the cache
# instead of downloading from Maven Central on every run.

concurrency:
  group: maven-cache-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'src/**/pom.xml'
      - 'src/.mvn/**'
      - 'src/mvnw'
      - 'src/mvnw.cmd'
      - '.github/workflows/maven-cache.yml'
  schedule:
    # Every Monday 02:00 UTC — refreshes cache before the work week
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  warm:
    name: Download & cache all Maven dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: src
        run: chmod +x mvnw

      - name: Download all dependencies (offline resolution)
        # --fail-at-end: keep going even if one module has issues, still populates cache
        working-directory: src
        run: ./mvnw -B -ntp -T 2 dependency:go-offline --fail-at-end

      - name: Pre-compile all modules (populate class cache)
        # test-compile ensures test dependencies are also cached
        working-directory: src
        run: ./mvnw -B -ntp -T 2 test-compile -DskipTests --fail-at-end
