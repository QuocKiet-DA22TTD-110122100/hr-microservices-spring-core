# Agent Configuration for HR Microservices

agents:
  - name: hr-domain-expert
    description: Expert on HR business workflows
    language: java
    targets: [hr-service, auth-service]
    skills: [payroll-patterns, employee-lifecycle, compliance-audit, continuous-learning]

  - name: spring-reviewer
    description: Spring Boot code reviewer
    language: java
    targets: [auth-service, hr-service, project-service, task-service, api-gateway]
    skills: [springboot-patterns, continuous-learning]

  - name: database-expert
    description: Database design & query optimization
    language: sql
    targets: [hr-service, project-service, task-service]
    skills: [query-optimization, schema-design, transaction-tuning]

skills:
  - id: payroll-patterns
    name: Payroll Pattern Recognition
    path: skills/payroll-patterns/SKILL.md

  - id: employee-lifecycle
    name: Employee Lifecycle Management
    path: skills/employee-lifecycle/SKILL.md

  - id: compliance-audit
    name: Compliance Auditing
    path: skills/compliance-audit/SKILL.md

  - id: springboot-patterns
    name: Spring Boot Best Practices
    path: skills/springboot-patterns/SKILL.md

  - id: query-optimization
    name: Query Optimization
    path: skills/query-optimization/SKILL.md

  - id: schema-design
    name: Database Schema Design
    path: skills/schema-design/SKILL.md

  - id: transaction-tuning
    name: Transaction Tuning
    path: skills/transaction-tuning/SKILL.md

  - id: continuous-learning
    name: Continuous Learning & Insight Extraction
    path: skills/continuous-learning/SKILL.md
