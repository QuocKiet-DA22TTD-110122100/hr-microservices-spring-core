version: '3.8'

services:
  # HAProxy Load Balancer as Gateway
  eureka-gateway:
    image: haproxy:2.8-alpine
    container_name: eureka-gateway
    ports:
      - "8760:8760"  # Gateway port
      - "8404:8404"  # HAProxy stats
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - eureka-peer1
      - eureka-peer2
      - eureka-peer3
    networks:
      - eureka-network
    restart: unless-stopped

  # Eureka Server Peer 1
  eureka-peer1:
    build:
      context: ./eureka-server
      dockerfile: dockerfile
    container_name: eureka-peer1
    hostname: eureka-peer1
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=peer1
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - eureka1-data:/app/data
    networks:
      - eureka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://eureka:123456@localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Eureka Server Peer 2
  eureka-peer2:
    build:
      context: ./eureka-server
      dockerfile: dockerfile
    container_name: eureka-peer2
    hostname: eureka-peer2
    ports:
      - "8762:8762"
    environment:
      - SPRING_PROFILES_ACTIVE=peer2
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - eureka2-data:/app/data
    networks:
      - eureka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://eureka:123456@localhost:8762/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Eureka Server Peer 3
  eureka-peer3:
    build:
      context: ./eureka-server
      dockerfile: dockerfile
    container_name: eureka-peer3
    hostname: eureka-peer3
    ports:
      - "8763:8763"
    environment:
      - SPRING_PROFILES_ACTIVE=peer3
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - eureka3-data:/app/data
    networks:
      - eureka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://eureka:123456@localhost:8763/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Demo Service for testing
  demo-service:
    build:
      context: ./demo-service
      dockerfile: Dockerfile
    container_name: demo-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka:123456@eureka-gateway:8760/eureka/
      - SPRING_APPLICATION_NAME=demo-service
    depends_on:
      - eureka-gateway
    networks:
      - eureka-network
    restart: unless-stopped

  # Mock Service (provides /api/v1/auth/register)
  mock-service:

      build:
        context: ./mock-service
        dockerfile: Dockerfile
      container_name: mock-service
      ports:
        - "8081:8081"  # host 8081 -> container 8081 (match mock-service server.port)
      environment:
        - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka:123456@eureka-gateway:8760/eureka/
        - SPRING_APPLICATION_NAME=mock-service
      depends_on:
        - eureka-gateway
      networks:
        - eureka-network
      restart: unless-stopped

  # Redis for API Gateway
  redis-server:
    image: redis:7-alpine
    container_name: eureka-redis-server
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis-data:/data
    networks:
      - eureka-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis-server
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_NAME=api-gateway
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka:123456@eureka-gateway:8760/eureka/
      - JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      - redis-server
      - eureka-gateway
    networks:
      - eureka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  eureka-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  eureka1-data:
  eureka2-data:
  eureka3-data:
  redis-data:

