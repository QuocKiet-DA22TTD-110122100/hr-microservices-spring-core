global
    # daemon
    log stdout format raw local0 info
    maxconn 4096
    # TLS tuning
    tune.ssl.default-dh-param 2048
    # Only allow TLS 1.2+
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    option httplog
    option dontlognull
    retries 3
    timeout connect 2000ms
    timeout client 30000ms
    timeout server 30000ms
    timeout check 10s

frontend eureka_frontend
    bind *:80
    bind *:8760 ssl crt /etc/ssl/certs/eureka.pem
    mode http
    # Redirect plain HTTP requests to HTTPS endpoint.
    http-request redirect scheme https code 301 unless { ssl_fc }
    http-request set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    # Compress responses for better transfer efficiency
    compression algo gzip
    compression type text/plain text/html text/css application/json
    # Route Eureka traffic to backend
    use_backend eureka_servers if { path_beg /eureka/ }
    default_backend eureka_servers

backend eureka_servers
    mode http
    balance roundrobin
    cookie EUREKA_SERVICE_ID insert indirect nocache
    # Deep health check for all Eureka peers
    option httpchk GET /actuator/health
    http-check expect status 200
    # Eureka peers
    server eureka-peer1 eureka-peer1:8761 check cookie peer1 inter 5s fall 3 rise 2
    server eureka-peer2 eureka-peer2:8762 check cookie peer2 inter 5s fall 3 rise 2
    server eureka-peer3 eureka-peer3:8763 check cookie peer3 inter 5s fall 3 rise 2

frontend stats_frontend
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 10s
    stats auth admin:admin123
