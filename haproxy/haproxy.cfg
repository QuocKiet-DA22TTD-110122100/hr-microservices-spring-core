global
    daemon
    log stdout local0 info
    maxconn 4096

defaults
    mode http
    log global
    option httplog
    option dontlognull
    retries 3
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    timeout check 10s

frontend eureka_frontend
    bind *:8760
    mode http
    default_backend eureka_servers

backend eureka_servers
    mode http
    balance roundrobin
    http-check send meth GET uri /actuator/health
    server eureka-peer1 eureka-peer1:8761 check inter 10s
    server eureka-peer2 eureka-peer2:8762 check inter 10s
    server eureka-peer3 eureka-peer3:8763 check inter 10s

frontend stats_frontend
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 10s
    stats auth admin:admin123