server.port=8082

# Local default uses host-mapped MySQL (3307). Docker compose overrides via SPRING_DATASOURCE_URL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/hr_db?createDatabaseIfNotExist=true}
spring.datasource.username=root
spring.datasource.password=root123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.application.name=hr-service

# Eureka
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:false}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:false}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka:123456@localhost:8760/eureka/}
eureka.instance.prefer-ip-address=true

# Management
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
