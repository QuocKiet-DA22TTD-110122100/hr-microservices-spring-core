global
    # daemon
    log stdout format raw local0 info
    maxconn 4096
    # TLS tuning
    tune.ssl.default-dh-param 2048
    # Only allow TLS 1.2+
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    option httplog
    option dontlognull
    retries 3
    timeout connect 2000ms
    timeout client 30000ms
    timeout server 30000ms
    timeout check 10s

frontend eureka_frontend
    bind *:80
    bind *:8760
    mode http
    # Local development keeps plain HTTP to avoid cert dependency.
    # Compress responses for better transfer efficiency
    compression algo gzip
    compression type text/plain text/html text/css application/json
    # Route only Eureka paths to backend
    acl is_eureka_path path_beg /eureka/

    # For non-Eureka paths, return a clear message instead of forwarding to Eureka
    http-request return status 200 content-type text/plain string "HAProxy is running. Use /eureka/ for Eureka API or use stats on port 8404." unless is_eureka_path
    use_backend eureka_servers if is_eureka_path

backend eureka_servers
    mode http
    balance roundrobin
    cookie EUREKA_SERVICE_ID insert indirect nocache
    # Dev mode uses one active Eureka peer
    option httpchk
    http-check send meth GET uri /actuator/health hdr Authorization "Basic YWRtaW46QWRtaW5fMjAyNA=="
    http-check expect status 200
    # Active peer
    server eureka-peer1 eureka-peer1:8761 check cookie peer1 inter 5s fall 3 rise 2
    #server eureka-peer2 eureka-peer2:8762 check cookie peer2 inter 5s fall 3 rise 2
    #server eureka-peer3 eureka-peer3:8763 check cookie peer3 inter 5s fall 3 rise 2

frontend stats_frontend
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 10s
    stats auth admin:admin123
