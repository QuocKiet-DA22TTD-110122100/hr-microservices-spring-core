groups:
  - name: hr-microservices-alerts
    rules:
      - alert: GatewayHigh429Rate
        expr: sum(rate(http_server_requests_seconds_count{job="api-gateway",status="429"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          service: api-gateway
          category: rate-limit
        annotations:
          summary: "API Gateway trả về quá nhiều HTTP 429"
          description: "Gateway đang trả về hơn 0.1 request/giây mã 429 trong 5 phút liên tiếp. Kiểm tra client spam, rate limit và luồng login/verify."

      - alert: GatewayLogin429Spike
        expr: sum(rate(http_server_requests_seconds_count{job="api-gateway",status="429",uri="/api/iam/login"}[5m])) > 0.03
        for: 5m
        labels:
          severity: warning
          service: api-gateway
          route: /api/iam/login
          category: rate-limit
        annotations:
          summary: "HTTP 429 tăng cao tại endpoint login"
          description: "Endpoint /api/iam/login đang có hơn 0.03 request/giây mã 429 trong 5 phút. Cần kiểm tra bot/spam hoặc tăng ngưỡng login phù hợp."

      - alert: GatewayRegister429Spike
        expr: sum(rate(http_server_requests_seconds_count{job="api-gateway",status="429",uri="/api/iam/register"}[5m])) > 0.01
        for: 5m
        labels:
          severity: warning
          service: api-gateway
          route: /api/iam/register
          category: rate-limit
        annotations:
          summary: "HTTP 429 tăng cao tại endpoint register"
          description: "Endpoint /api/iam/register đang có hơn 0.01 request/giây mã 429 trong 5 phút. Cần rà luồng đăng ký hoặc bất thường traffic."

      - alert: ServiceHighP95Latency
        expr: histogram_quantile(0.95, sum by (le, job) (rate(http_server_requests_seconds_bucket{job=~"api-gateway|auth-service|hr-service|kms-service"}[5m]))) > 1
        for: 5m
        labels:
          severity: warning
          category: latency
        annotations:
          summary: "p95 latency vượt ngưỡng"
          description: "Một trong các service api-gateway/auth-service/hr-service/kms-service có p95 latency lớn hơn 1s trong 5 phút liên tiếp."