# Docker Compose file using pre-built images from Docker Hub
# This avoids rebuilding images locally - much faster for development and CI/CD
# 
# Usage:
#   docker-compose -f microservices-compose-registry.yml up -d
#
# Prerequisites:
#   1. Set DOCKERHUB_USERNAME environment variable:
#      - Linux/Mac: export DOCKERHUB_USERNAME=your-username
#      - Windows: $env:DOCKERHUB_USERNAME="your-username" (PowerShell)
#   2. Run ./docker-build-registry.sh|.ps1 to build and push images first

x-eureka-default-zone: &eureka_default_zone http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer1:${EUREKA_PEER1_PORT}/eureka/
x-java-opts: &java_opts -Xmx256m -Xms128m
x-logging-level: &logging_level WARN

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 100m

  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy-lb
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "${HAPROXY_HTTP_PORT:-8088}:80"
      - "${HAPROXY_EUREKA_PORT:-18760}:8760"
      - "${HAPROXY_STATS_PORT:-18404}:8404"
    depends_on:
      eureka-peer1:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 100m

  # Eureka Server - using Docker Hub image
  eureka-peer1:
    image: ${DOCKERHUB_USERNAME}/hr-service-eureka-server:latest
    container_name: eureka-peer1
    hostname: eureka-peer1
    ports:
      - "${EUREKA_PEER1_PORT}:${EUREKA_PEER1_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: peer1
      SERVER_PORT: ${EUREKA_PEER1_PORT}
      EUREKA_USERNAME: ${EUREKA_USERNAME}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_PEER1_PORT: ${EUREKA_PEER1_PORT}
      EUREKA_PEER2_PORT: ${EUREKA_PEER2_PORT}
      EUREKA_PEER3_PORT: ${EUREKA_PEER3_PORT}
      SPRING_SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      SECURITY_USER_NAME: ${EUREKA_USERNAME}
      SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
    volumes:
      - eureka1-data:/app/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@localhost:${EUREKA_PEER1_PORT}/actuator/health); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"401\" ]"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # MySQL for auth/hr/kms services
  mysql:
    image: mysql:8.0
    container_name: mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_HR_DB}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/seed-hr-data.sql:/docker-entrypoint-initdb.d/01-seed-hr-data.sql:ro
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_PASSWORD} --silent"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # PostgreSQL for auth-service
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 250m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  # API Gateway - using Docker Hub image
  api-gateway:
    image: ${DOCKERHUB_USERNAME}/hr-service-api-gateway:latest
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_PORT}:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: *eureka_default_zone
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
    depends_on:
      - eureka-peer1
      - redis
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  # Auth Service - using Docker Hub image
  auth-service:
    image: ${DOCKERHUB_USERNAME}/hr-service-auth-service:latest
    container_name: auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:8086"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: *eureka_default_zone
      EUREKA_INSTANCE_HOSTNAME: auth-service
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: ${AUTH_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_SQL_INIT_MODE: always
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
    depends_on:
      - eureka-peer1
      - mysql
      - auth-postgres
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m

  # HR Service - using Docker Hub image
  hr-service:
    image: ${DOCKERHUB_USERNAME}/hr-service-hr-service:latest
    container_name: hr-service
    ports:
      - "${HR_SERVICE_PORT}:8085"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: *eureka_default_zone
      EUREKA_INSTANCE_HOSTNAME: hr-service
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_HR_DB}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
    depends_on:
      - eureka-peer1
      - mysql
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8085/actuator/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # KMS Service - using Docker Hub image
  kms:
    image: ${DOCKERHUB_USERNAME}/hr-service-kms:latest
    container_name: kms
    ports:
      - "${KMS_SERVICE_PORT}:8087"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: *eureka_default_zone
      EUREKA_INSTANCE_HOSTNAME: kms
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_KMS_DB}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
    depends_on:
      - eureka-peer1
      - mysql
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8087/actuator/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  microservices-network:
    driver: bridge

volumes:
  redis-data:
  mysql-data:
  auth-postgres-data:
  eureka1-data:
