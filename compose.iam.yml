x-eureka-default-zone: &eureka_default_zone http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka-peer1:${EUREKA_PEER1_PORT}/eureka/
x-java-opts: &java_opts -Xmx384m -Xms128m
x-java-tool-options: &java_tool_options -Djava.security.egd=file:/dev/./urandom
x-logging-level: &logging_level WARN

services:
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    networks:
      - microservices-network
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kms-service:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-kms-service:${IMAGE_TAG:-latest}
    build:
      context: ./kms
      dockerfile: Dockerfile
    container_name: kms-service
    ports:
      - "8083:8083"
    environment:
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - microservices-network
    restart: on-failure
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/actuator/health"]
      interval: 20s
      timeout: 30s
      retries: 8
      start_period: 240s

  auth-service:
    image: ghcr.io/quockiet-da22ttd-110122100/hr-auth-service:${IMAGE_TAG:-latest}
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8086:8086"
    volumes:
      # Override data.sql trong JAR bằng file local — chứa 20 users + hash đúng
      - ./auth-service/src/main/resources/data.sql:/data.sql:ro
    environment:
      SERVER_PORT: "8086"
      DB_URL: ${AUTH_DB_URL}
      DB_USERNAME: ${AUTH_DB_USERNAME}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      KMS_BASE_URL: http://kms-service:8083
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: *eureka_default_zone
      LOGIN_MAX_FAILURES: ${LOGIN_MAX_FAILURES}
      LOGIN_LOCK_MINUTES: ${LOGIN_LOCK_MINUTES}
      PASSWORD_EXPIRY_DAYS: ${PASSWORD_EXPIRY_DAYS}
      HR_SYNC_ENABLED: "true"
      HR_SYNC_BASE_URL: http://hr-service:8082
      HR_SYNC_INTERNAL_SECRET: ${INTERNAL_SECRET}
      LOGGING_LEVEL_ROOT: *logging_level
      JAVA_OPTS: *java_opts
      JAVA_TOOL_OPTIONS: *java_tool_options
      # Trỏ Spring Boot dùng data.sql từ volume mount thay vì file trong JAR
      SPRING_SQL_INIT_DATA_LOCATIONS: "file:/data.sql"
    depends_on:
      auth-postgres:
        condition: service_healthy
      kms-service:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/actuator/health"]
      interval: 20s
      timeout: 30s
      retries: 8
      start_period: 240s

networks:
  microservices-network:
    name: microservices-network
    external: true

volumes:
  auth-postgres-data:
    name: auth-postgres-data
